<!DOCTYPE html>
<html lang="en">
<head>

<title>Off the Main Road — Destination Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'nunito', sans-serif;
  height: 100vh;
  overflow: hidden;
  background: #f5f2ee;
}

#map {
  width: 100%;
  height: 100vh;
}

.otmr-cluster {
  background: #61856F;
  border: 3px solid #fff;
  border-radius: 50%;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

#sidebar {
  position: fixed;
  top: 10px;
  right: 10px;
  bottom: 10px;
  width: 300px;
  background: #FDFAF6;
  border-left: none;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  z-index: 1000;
  transform: translateX(320px);
  transition: transform 0.28s ease;
  box-shadow: -4px 0 30px rgba(0,0,0,0.15);
  overflow: hidden;
}

#sidebar.open {
  transform: translateX(0);
}

#sb-img-wrap {
  position: relative;
  height: 300px;
  flex-shrink: 0;
  background: #f0ece6;
  overflow: hidden;
  border-radius: 0 0 12px 12px;
}

#sb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  position: absolute;
  top: 0; left: 0;
}

#sb-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#sb-close {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: none;
  cursor: pointer;
  color: #fff;
  font-size: 16px;
  line-height: 30px;
  text-align: center;
  z-index: 10;
}

#sb-close:hover { background: rgba(0,0,0,0.75); }

#sb-body {
  padding: 18px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#sb-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  align-self: flex-start;
}

#sb-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c2a26;
  line-height: 1.3;
}

#sb-location {
  font-size: 12px;
  color: #8a8278;
}

#sb-excerpt {
  font-size: 13px;
  color: #5a5650;
  line-height: 1.65;
  flex: 1;
}

#sb-btn {
  display: block;
  text-align: center;
  padding: 11px 16px;
  background: #61856F;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s;
}

#sb-btn:hover { background: #4a6657; }

  #sb-nearby { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 4px; }
.nearby-chip {
  font-size: 11px;
  font-weight: 500;
  color: #61856F;
  background: #f0f5f2;
  border: 1px solid #c8dbd0;
  border-radius: 20px;
  padding: 4px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  text-align: left;}
.nearby-chip:hover { background: #61856F; color: #fff; border-color: #61856F; }
.nearby-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #aaa49e; }

.leaflet-control-attribution { font-size: 10px !important; }
</style>
</head>

<div id="sidebar">
  <div id="sb-img-wrap">
    <img id="sb-img" src="" alt=""/>
    <div id="sb-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2c2a26" stroke-width="1.2" opacity="0.3">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <button id="sb-close" onclick="closeSidebar()">&#x2715;</button>
  </div>
  <div id="sb-body">
    <span id="sb-tag"></span>
    <p id="sb-title"></p>
    <p id="sb-location"></p>
    <p id="sb-excerpt"></p>
    <div id="sb-nearby"></div>
    <a id="sb-btn" href="#" target="_blank">Read the full story &rarr;</a>
  </div>
</div>

<script>

const PIN_COLOR = "#61856F";

const STATE_NAMES = {
  QLD: "Queensland", NSW: "New South Wales", VIC: "Victoria",
  SA: "South Australia", WA: "Western Australia", NT: "Northern Territory", TAS: "Tasmania"
};

/* ── Destinations ──────────────────────────────────────────────
   To add a new article, copy any entry and paste it at the top.
   Fill in name, state, lat, lng, title, excerpt, url, img.
────────────────────────────────────────────────────────────── */
const destinations = [
/* ── South Australia── */
{ name:"Adelaide", state:"SA", lat:-34.9285, lng:138.6007, title:"Adelaide: Museums, Markets and a Slow Day in the City", excerpt:"Spend a slow day in Adelaide with art galleries, museums, the Botanic Gardens and the iconic Central Market. Our favourite city stops in one easy loop through South Australia's capital.", url:"https://www.offthemainroad.com.au/latest/adelaide", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6930a1558e72653f0581ff5c/1764794709801/IMG_2305.jpg?format=1500w" },
{ name:"Hahndorf", state:"SA", lat:-35.0333, lng:138.8167, title:"Hahndorf: German Heritage, Gin Tastings and Adelaide Hills Food", excerpt:"Explore Hahndorf in the Adelaide Hills: German heritage, gin tastings, Beerenberg Farm and relaxed village wandering. A perfect food-filled day trip near Adelaide.", url:"https://www.offthemainroad.com.au/latest/hahndorf", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/692bf4ad8342631cdb547c61/1764488365142/IMG_2284.jpg?format=1500w" },
{ name:"McLaren Vale", state:"SA", lat:-35.2167, lng:138.5500, title:"McLaren Vale: d'Arenberg Cube, Chalk Hill and Wine Country", excerpt:"Visit McLaren Vale for quirky art at the d'Arenberg Cube, pizza at Chalk Hill, top cellar doors and must-stop treats like Fruchocs.", url:"https://www.offthemainroad.com.au/latest/mclarenvale", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691ed7c725ed2f072cf70d1f/1763628999818/IMG_0045.jpg?format=1500w" },
{ name:"Barossa: Whispering Wall", state:"SA", lat:-34.5167, lng:138.9500, title:"Barossa: Sculpture Park and the Whispering Wall", excerpt:"Visit the Barossa Sculpture Park and Whispering Wall. Art, valley views, historic engineering and the acoustic trick that carries whispers 140 metres across the dam.", url:"https://www.offthemainroad.com.au/latest/barossa-whispering-wall", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691eb0ce5bbc6e1029d6b9b8/1763619022711/IMG_3082.jpg?format=1500w" },
{ name:"Nuriootpa: Maggie Beer's Farm", state:"SA", lat:-34.4667, lng:138.9833, title:"Nuriootpa:Maggie Beer's Farm Shop and Barossa Morning Tea", excerpt:"Visit Maggie Beer's Farm Shop in Nuriootpa. Morning tea by the lake, Cook and the Chef filming kitchen, quinces, orchard walks and Barossa calm.", url:"https://www.offthemainroad.com.au/latest/maggies-farm", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691ead500098d7493d010870/1763618128868/IMG_2638.jpeg?format=1500w" },
{ name:"Waikerie", state:"SA", lat:-34.1833, lng:139.9833, title:"Waikerie: River Ferries, Silo Art and Citrus Country", excerpt:"Visit Waikerie in South Australia's Riverland. River ferries, silo art, Nippy's milk, riverfront walks and one of our favourite bakeries in the country.", url:"https://www.offthemainroad.com.au/latest/waikerie", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691e84070098d7493d00e6eb/1763607559808/IMG_2784.jpeg?format=1500w" },
{ name:"Renmark", state:"SA", lat:-34.1667, lng:140.7500, title:"Renmark: What to Do, Dog-Friendly Stops & an Easy Day Trip", excerpt:"A relaxed day in Renmark. Headings Cliff lookout, the historic Paringa lifting bridge, pet-friendly cafés and kangaroos along the river tracks.", url:"https://www.offthemainroad.com.au/latest/renmark", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/69185147c369aa782aa20013/1763201351938/IMG_3005.jpeg?format=1500w" },
{ name:"Coober Pedy", state:"SA", lat:-29.0135, lng:134.7544, title:"Coober Pedy: Underground Life and Opal Dreams", excerpt:"Beneath the desert heat of Coober Pedy lies a town built underground — opals, dugouts, and outback grit in South Australia's most unusual stopover.", url:"https://www.offthemainroad.com.au/latest/cooberpedy", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/677de8c08c6bc52e8f6646ef/1736304911707/IMG_7598.jpg?format=1500w" },
{ name:"Lake Bonney, Barmera", state:"SA", lat:-34.2500, lng:140.4667, title:"Lake Bonney and Barmera: A Laid-Back Stop in the Riverland", excerpt:"Calm water, sunsets, and small-town charm. Lake Bonney at Barmera is a peaceful Riverland stop perfect for campers, swimmers, and slow travellers chasing South Australia's relaxed side.", url:"https://www.offthemainroad.com.au/latest/lakebonney", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a02ee8349ca524447d7b36/1760772943592/469162411_18008702990673613_8749658563561103998_n.jpg?format=1500w" },
{ name:"Farrell Flat", state:"SA", lat:-33.8167, lng:138.8000, title:"Farrell Flat: Silo Art and Country Pub Charm", excerpt:"A quick stop between Burra and Clare, Farrell Flat surprises with big-hearted locals, a historic pub, and one of South Australia's best pieces of silo art.", url:"https://www.offthemainroad.com.au/latest/farrellflat", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a047bb6166f51fba13d73f/1760772937160/469250013_18008701970673613_1416303917373296075_n.jpg?format=1500w" },
{ name:"Château Yaldara", state:"SA", lat:-34.5333, lng:138.9000, title:"Château Yaldara: Barossa History and Wine Tasting", excerpt:"Visit Château Yaldara in the Barossa. Historic architecture, classic red wines, fortifieds and riverfront grounds in Lyndoch.", url:"https://www.offthemainroad.com.au/latest/chateauyaldara", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691ed2445bbc6e1029d6cdaf/1763627588662/Chateau+Yaldara.jpg?format=1500w" },
{ name:"Wirrabara", state:"SA", lat:-33.0333, lng:138.2667, title:"Wirrabara", excerpt:"Driving into Wirrabara, we immediately spotted the towering artwork, a stunning addition to South Australia's Silo Art Trail.", url:"https://www.offthemainroad.com.au/latest/wirraburra", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a0497eb23d742bd0d8926d/1760772917792/469222240_18008702120673613_6201080849379515516_n.jpg?format=1500w" },
{ name:"Parachilna", state:"SA", lat:-31.1333, lng:138.4000, title:"Parachilna: Prairie Hotel, Feral Food & Flinders Stop", excerpt:"Visit Parachilna in South Australia for a relaxed stop at the Prairie Hotel. Feral food, outback history, and an easy pause on the edge of the Flinders Ranges.", url:"https://www.offthemainroad.com.au/latest/parachilna", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a04a2bf5b6c40e7ea30db1/1765790785269/Prairie+Hotel.jpg?format=1500w" },
{ name:"Leigh Creek", state:"SA", lat:-30.5833, lng:138.4000, title:"Leigh Creek: A Town in Transition", excerpt:"Visit Leigh Creek, a former coal town in South Australia's Flinders Ranges now finding new life. Discover its past, the vast open-cut mine, and the resilient community shaping the town's future.", url:"https://www.offthemainroad.com.au/latest/leighcreek", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a04ad89226da0371353a6c/1760772904157/469120902_18008701982673613_8352526249675027075_n.jpg?format=1500w" },
{ name:"Carrieton & Johnburg", state:"SA", lat:-32.4333, lng:138.5167, title:"Carrieton & Johnburg: Outback Heritage & Quiet Country Towns", excerpt:"Visit Carrieton and Johnburg, two quiet towns in South Australia's outback. Discover rodeo heritage, stone buildings, and the peaceful charm of life off the main road.", url:"https://www.offthemainroad.com.au/latest/carrieton", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68e6e578e89d27768f7b88ff/1759962488839/434662619_17977680191673613_4285692039490006271_n.jpg?format=1500w" },
{ name:"Pandurra Station", state:"SA", lat:-32.4500, lng:137.8000, title:"Pandurra Station: South Australia Outback Travel Stay", excerpt:"Experience South Australia outback travel at Pandurra Station and Nutbush Retreat near Port Augusta. Stay on a working sheep station, tour the shearing shed, and enjoy sunsets over the red plains.", url:"https://www.offthemainroad.com.au/latest/pandurrastation", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a05d6ba43c9045e77999fe/1760772875732/469195963_18008702081673613_1318726345414053311_n.jpg?format=1500w" },
{ name:"Iron Knob", state:"SA", lat:-32.7333, lng:137.1500, title:"Iron Knob: Mining History and Australia's Steel Story", excerpt:"A visit to Iron Knob in South Australia, exploring its mining history, open-cut mine tour, and role in Australia's steel industry. A raw, practical stop near Whyalla on the Eyre Peninsula.", url:"https://www.offthemainroad.com.au/latest/iron-knob", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/69811300d969c935e4ce0304/1770066688182/IMG_2172.jpg?format=1500w" },
{ name:"Kimba", state:"SA", lat:-33.1333, lng:136.4167, title:"Kimba: Silo Art, the Giant Galah and a Great Free Camp", excerpt:"Kimba is a welcoming stop on South Australia's Eyre Peninsula, known for silo art, the Giant Galah, Workshop26 café, and one of Australia's best free camps right in town.", url:"https://www.offthemainroad.com.au/latest/kimba", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6984fd496a1d184ccf93cecf/1770323273076/IMG_2166.jpg?format=1500w" },
{ name:"Wudinna", state:"SA", lat:-33.0500, lng:135.4667, title:"Wudinna: Granite, Stars and New Mates", excerpt:"Climbing Mt Wudinna gave us sweeping views and sore calves, while nearby Polda Rock offered a quiet slice of history. We wrapped the day with stargazing, new mates, and moonlight — outback travel at its best.", url:"https://www.offthemainroad.com.au/latest/mtwudinna", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/684f876894fa8c7777dd022a/1763681614754/469303992_18008701646673613_920144801279322452_n.jpg?format=1500w" },
{ name:"Wirrulla", state:"SA", lat:-32.3833, lng:134.5333, title:"Wirrulla: The Jetty without a Tide", excerpt:"Discover Wirrulla, the outback town with the world's only inland jetty. A quirky stop on the Eyre Peninsula where the tide never comes in.", url:"https://www.offthemainroad.com.au/latest/wirrulla", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68ffd6a3f2b196065a781e84/1761597091123/469120872_18008702015673613_6733575477633716453_n.jpg?format=1500w" },
{ name:"Penong & Lake MacDonnell", state:"SA", lat:-31.9167, lng:133.0167, title:"Pink Lake, Big Skies", excerpt:"From bubblegum-pink waters to spinning giants of steel, Lake MacDonnell and Penong's Windmill Museum gave us one of our most colourful days yet. A little off the main road — and totally worth it.", url:"https://www.offthemainroad.com.au/latest/penong", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/690285ca2b6d597fa22bd2a1/1761773002787/469278446_18008701925673613_783620613695857616_n.webp?format=1500w" },
{ name:"Ceduna", state:"SA", lat:-32.1333, lng:133.6667, title:"Ceduna: Wharf Walks, Museum Days and Coastal Calm", excerpt:"Ceduna on South Australia's far-west coast. Foreshore walks, the local museum, quiet days by the sea and a gateway for future Maralinga adventures.", url:"https://www.offthemainroad.com.au/latest/ceduna", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691f9a8818ed673989f88afe/1763678856596/IMG_1639+%282%29.jpg?format=1500w" },
{ name:"Baird Bay", state:"SA", lat:-33.1167, lng:134.3167, title:"Baird Bay: Sea Lions, Sunsets and Swaps", excerpt:"Swimming with a sea lion pup and a pod of dolphins in Baird Bay kicked off a magical stretch of coast. Fresh crabs, epic sunsets, and time to unwind made this leg one to remember.", url:"https://www.offthemainroad.com.au/latest/bairdbay", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/685394b7209926641aed3298/1750308023763/469140942_18008700635673613_5214694956221579351_n.jpg?format=1500w" },
{ name:"Murphy's Haystacks & Talia Caves", state:"SA", lat:-33.3167, lng:134.9000, title:"Murphy's Haystacks & Talia Caves: Stone, Sea and Quiet Camps", excerpt:"We camped alone beside Murphy's Haystacks, exploring the surreal boulders at both sunset and sunrise. With local honey for breakfast and sea-carved caves nearby, this quiet corner of the Eyre Peninsula left a lasting impression.", url:"https://www.offthemainroad.com.au/latest/murphyshaystacks", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/6853974dbc6ba91bcec40c2e/1764372672358/469140739_18008700998673613_4722065227158227476_n.jpg?format=1500w" },
{ name:"Elliston", state:"SA", lat:-33.6500, lng:134.8833, title:"Elliston: Seaside Creativity", excerpt:"Stormy skies couldn't dull the charm of Elliston. From windswept jetty walks to the quirky sculptures along the Great Ocean Drive, this coastal town served up wild weather, dramatic views, and creative surprises.", url:"https://www.offthemainroad.com.au/latest/elliston", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/685607c8c9be8157fa2f3a52/1760772825439/469208518_18008700509673613_725116440466624307_n.jpg?format=1500w" },
{ name:"Coffin Bay", state:"SA", lat:-34.6167, lng:135.4667, title:"Coffin Bay: Oysters, National Park & Slow Coastal Travel", excerpt:"Visit Coffin Bay SA — oysters, calm coastal camping, national park beaches, local seafood and quiet village life. A slow-travel guide with tips on the best oysters and things to do in Coffin Bay.", url:"https://www.offthemainroad.com.au/latest/coffin-bay", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/693493d6381b741bbf0d4367/1765054619587/IMG_1707.jpg?format=1500w" },
{ name:"Port Lincoln", state:"SA", lat:-34.7333, lng:135.8667, title:"Port Lincoln: Facing Fears", excerpt:"Port Lincoln dished up an unforgettable day as Cameron took on a shark diving dare. No sharks, but the real thrill was facing the deep blue and walking away braver, and wetter than before.", url:"https://www.offthemainroad.com.au/latest/portlincoln", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/68572b2271e07359e68a79e9/1760772808685/469286775_18008700704673613_3372333966322166895_n.jpg?format=1500w" },
{ name:"Tumby Bay", state:"SA", lat:-34.3667, lng:136.1000, title:"Tumby Bay: Street Art, Jetty Views and Coastal Calm", excerpt:"Discover Tumby Bay on the Eyre Peninsula: jetty views, vibrant street art, Yeldulknie Weir and slow coastal charm. A relaxed stop between Port Neill and Port Lincoln.", url:"https://www.offthemainroad.com.au/latest/tumbybay", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/692a2c5380600a01dce336b3/1764371539160/469140746_18008699387673613_1158856293943559948_n.jpg?format=1500w" },
{ name:"Whyalla & Cowell", state:"SA", lat:-33.0333, lng:137.5667, title:"Whyalla & Cowell: Steel, Sea and Small-Town Charm", excerpt:"Explore Whyalla's steelworks, circular jetty, and Point Lowly Lighthouse before heading south to Cowell's colourful silo art and quiet coastlines. A perfect slice of Eyre Peninsula travel.", url:"https://www.offthemainroad.com.au/latest/whyalla", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/690bccc3f5e03b6b9ab2b64a/1762380995687/469326281_18008699531673613_8558429415446032037_n.webp?format=1500w" },
{ name:"Spear Creek", state:"SA", lat:-32.5833, lng:138.6333, title:"Spear Creek Flinders Ranges: Camping, Trails and Ancient Landscapes", excerpt:"Spear Creek delivers rugged walking trails, ancient landscapes and big-sky views on the edge of the Southern Flinders Ranges. A peaceful station stay with sunrise hikes, rocky gullies and unforgettable outback evenings.", url:"https://www.offthemainroad.com.au/latest/spearcreek", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6931fdbbfcd4a839fc94d11f/1764883899142/IMG_7447.jpeg?format=1500w" },
{ name:"Port Augusta", state:"SA", lat:-32.4936, lng:137.7654, title:"Port Augusta: Where the Desert Meets the Sea", excerpt:"Port Augusta, South Australia: crossroads of the outback. Explore Spear Creek, Pandurra Station, and local highlights including the Arid Lands Botanic Garden and Wadlata Outback Centre.", url:"https://www.offthemainroad.com.au/latest/port-augusta", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/69066c508a3aff4c42cf4731/1762028624636/unsplash-image-uiWqatFp9n0.jpg?format=1500w" },
{ name:"Moonta", state:"SA", lat:-34.0667, lng:137.5833, title:"Moonta: Mining Tales and Mateship", excerpt:"We rolled into Moonta with good friends and found history, sandstone charm, and a camp full of laughs. Exploring the old copper mine and eerie slime pits gave us a glimpse into South Australia's mining past.", url:"https://www.offthemainroad.com.au/latest/moonta", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/685918f9ee4717233c5440a1/1760780518609/469351467_18008698037673613_7777452120649171669_n.jpg?format=1500w" },
{ name:"Innes National Park", state:"SA", lat:-35.2333, lng:136.8833, title:"Innes National Park: Coast, Cliffs and Riding Days", excerpt:"Ride through Dhilba Guuranda–Innes National Park on South Australia's Yorke Peninsula. Long coastal roads, shipwreck history, cliff lookouts and open beaches.", url:"https://www.offthemainroad.com.au/latest/dhilba-guurandainnes-national-park", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6916e63ddc1bc40ece256372/1763108413453/469163264_18008698328673613_348354743554328760_n.jpg?format=1500w" },
{ name:"Southern Yorke Peninsula", state:"SA", lat:-35.0833, lng:137.5500, title:"Yorke Peninsula: Southern Yorke Surprises", excerpt:"Coastal charm, striking silo art, and a slice of history! Our loop through Stansbury, Edithburgh and Wool Bay gave us quiet beaches, quirky sculptures, and a deeper look at South Australia's hardworking past.", url:"https://www.offthemainroad.com.au/latest/southernyorke", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/685b356982b9273729cc344d/1760772763429/469292485_18008697173673613_5285867070044512713_n.jpg?format=1500w" },
{ name:"Ardrossan", state:"SA", lat:-34.4167, lng:137.9167, title:"Ardrossan: Crabbing, History and a Yorke Peninsula Stop", excerpt:"Ardrossan is a small coastal town on South Australia's Yorke Peninsula, known for blue swimmer crabbing, agricultural history, and relaxed foreshore walks. A practical stop when exploring the peninsula.", url:"https://www.offthemainroad.com.au/latest/ardrossan", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6983c10a6504d0400fb66d6e/1770242314956/469284239_18008697311673613_9138176332324882449_n.jpg?format=1500w" },
{ name:"Port Willunga", state:"SA", lat:-35.2833, lng:138.4667, title:"Port Willunga: Coast, Wine and Slow Days", excerpt:"Explore Port Willunga on South Australia's Fleurieu Peninsula. Beach walks, historic fishing caves, McLaren Vale wineries, Kuitpo Forest adventures and warm coastal days.", url:"https://www.offthemainroad.com.au/latest/portwillunga", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6916e2a1dc1bc40ece2561ee/1763107489903/469196593_18008697401673613_142043163046930332_n.jpg?format=1500w" },
{ name:"Victor Harbor", state:"SA", lat:-35.5500, lng:138.6167, title:"Victor Harbor: Coastal Walks and Granite Island Adventures", excerpt:"Discover Victor Harbor on SA's Fleurieu coast, offering relaxed coastal walks, beachfront camping, and South Australia's classic horse-drawn tram.", url:"https://www.offthemainroad.com.au/latest/victorharbour", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/685b47af7ca153323dac2f95/1762644798314/469229606_18008697176673613_2717498485196460390_n.jpg?format=1500w" },

{ name:"Longreach", state:"QLD", lat:-23.4424, lng:144.2508, title:"Things to Do in Longreach: Our Favourites", excerpt:"Our favourite things to do in Longreach! The Qantas Founders Museum, Stockman's Hall of Fame, outback rail and river tours, Smithy's show.", url:"https://www.offthemainroad.com.au/latest/things-to-do-in-longreach", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a3622ffbbaef61d5bb3e238/1781932799038/THings+to+do+in+longreach+social+cover.jpg?format=1500w" },
{ name:"Longreach", state:"QLD", lat:-23.4424, lng:144.2508, title:"Longreach: Rail, River and a Town That Waves Back", excerpt:"Back in Longreach for our third visit. Outback rail adventures, a sunset cruise on the Thomson River, the Longreach Races, new Akubras, and the friendliest welcome yet.", url:"https://www.offthemainroad.com.au/latest/longreach-3", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a3091b7dbedb812c32b5bf9/1781567927777/Longreach_10.jpg?format=1500w" },
{ name:"Blackall", state:"QLD", lat:-24.4244, lng:145.4583, title:"Blackall Queensland: Steam, Wool and Jackie Howe", excerpt:"Visit the Blackall Historical Woolscour, Australia's only surviving steam-powered woolscour. Add the Jackie Howe shearing record statue and free camping on the Barcoo River.", url:"https://www.offthemainroad.com.au/latest/blackall", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/6a20c024354bc75359724f91/1781470875257/IMG_3886.jpeg?format=1500w" },
{ name:"Tambo", state:"QLD", lat:-24.8833, lng:146.2667, title:"Tambo Queensland: Tambo Teddies, Chicken Races and the Qantas Crash", excerpt:"Visit Tambo, QLD! Pick your Tambo Teddy, watch the chicken races, and find the site of Qantas's first crash in 1927. Free camping at Stubby Bend on the Barcoo River.", url:"https://www.offthemainroad.com.au/latest/tambo-1", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a23fb6b71545e6381c7e56c/1780743019527/IMG_3870.jpg?format=1500w" },
{ name:"Charleville", state:"QLD", lat:-26.4032, lng:146.2414, title:"Charleville: Finding the Hidden Gems", excerpt:"Four visits to Charleville and still finding new things — the Angellala Creek explosion site, the Airfield Museum, the Bureau of Meteorology weather balloon and the WWII quarry that built the airport runways.", url:"https://www.offthemainroad.com.au/latest/charleville-3", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a21462a9d129d02efd45d12/1780565546968/IMG_4296.jpg?format=1500w" },
{ name:"Charleville", state:"QLD", lat:-26.4032, lng:146.2414, title:"Things to Do in Charleville: Slow Down, Stay Longer", excerpt:"Everything to do in Charleville QLD. Cosmos Centre, Bilby Experience, RFDS, WWII Secret Base, Hotel Corones, Airfield Museum, Outback Date Farm and the Angellala Creek explosion site.", url:"https://www.offthemainroad.com.au/latest/things-to-do-in-charleville", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a273cf0dbedb812c3245cd2/1780956400251/OTMR+Website+Social+Sharing+Images+%281080+x+566+px%29+Charleville.jpg?format=1500w" },
{ name:"Wyandra", state:"QLD", lat:-27.2167, lng:145.9833, title:"Wyandra Queensland: Free Camping on the Warrego River", excerpt:"Stop at Wyandra halfway between Cunnamulla and Charleville. Free camping, outback burgers at the post office, a river beach and some of outback Queensland's best sunsets.", url:"https://www.offthemainroad.com.au/latest/wyandra", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a20aec4dbedb812c320005e/1780526788296/IMG_4191.jpg?format=1500w" },
{ name:"Cunnamulla", state:"QLD", lat:-28.0667, lng:145.6833, title:"Cunnamulla Queensland: Hot Springs, All Aboard and the Races", excerpt:"Discover Cunnamulla QLD. Artesian hot springs, the All Aboard railway experience, the Robbers Tree and outback race day. Get the adventure pass and stay longer than planned.", url:"https://www.offthemainroad.com.au/latest/cunnamulla-2", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6a1b70d25c8ba819bdaf29f1/1780183250180/IMG_3706.jpeg?format=1500w" },
{ name:"Toowoomba", state:"QLD", lat:-27.5598, lng:151.9507, title:"Toowoomba Queensland: Gardens, Markets and Unexpected Charm", excerpt:"Four days in Toowoomba revealed more than we expected. Gardens, markets, architecture, and country charm wrapped in a city's heart. Big skies, big buildings, and even bigger surprises on the range.", url:"https://www.offthemainroad.com.au/latest/toowoomba", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/68f696dd478b6e52ecf3485b/1769459054934/8AB76B16-94ED-4863-8F2D-294EF4E0CA49_1_105_c.jpg?format=1500w" },
{ name:"Kingaroy", state:"QLD", lat:-26.5399, lng:151.8394, title:"Monto to Kingaroy: Bush Learning and Peanut Chasing", excerpt:"From Monto's abandoned Rex Cinema to a wild peanut chase in Kingaroy, this stretch of Queensland served up bush history, local yarns, and more than a few laughs along the Burnett Highway.", url:"https://www.offthemainroad.com.au/latest/monto-kingaroy", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68f693d8fe484821b2be596b/1760990168302/IMG_1930.jpeg?format=1500w" },
{ name:"Biloela", state:"QLD", lat:-24.3967, lng:150.5142, title:"Biloela Queensland: Repairs, Dams and Country Charm", excerpt:"Stuck in Biloela for the weekend, we discovered more than new windscreens. From heritage museums to Callide Dam and country hospitality, this Central Queensland town turned a delay into a highlight.", url:"https://www.offthemainroad.com.au/latest/biloela", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68f004007299ba1a4163fd47/1760560128474/IMG_1924.JPG?format=1500w" },
{ name:"Emerald", state:"QLD", lat:-23.5269, lng:148.1619, title:"Emerald QLD: A Central Queensland Crossroads Town", excerpt:"Emerald is a key Central Queensland hub for travellers heading west to Longreach or east to Rockhampton. Stock up, refuel, explore the gardens, murals and dog park before continuing your journey.", url:"https://www.offthemainroad.com.au/latest/emerald", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/698ce8d1c541b61476a64cb1/1770842321008/IMG_5468.jpg?format=1500w" },
{ name:"Gregory Highway", state:"QLD", lat:-20.9000, lng:146.2000, title:"Charters Towers to Emerald: Distance, Road Conditions & Stops", excerpt:"How long is the Charters Towers to Emerald drive? 5–6 hours on the Gregory Highway. Sealed but rough. Real road conditions, fuel stops and what to expect.", url:"https://www.offthemainroad.com.au/latest/charterstowerstoemerald", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68ef17f1c8d07324547d546a/1760499697950/IMG_5452.jpeg?format=1500w" },
{ name:"Charters Towers", state:"QLD", lat:-20.0833, lng:146.2667, title:"Charters Towers QLD: Gold Rush Heritage & Hidden Gems", excerpt:"Discover Charters Towers, Queensland — a gold-rush town full of history, murals, and character. Explore Towers Hill, Ravenswood, and quirky local landmarks on your outback road trip.", url:"https://www.offthemainroad.com.au/latest/charterstowers", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6924d118fa9c423a4e0ed328/1764020504614/IMG_1792.jpg?format=1500w" },
{ name:"Cloncurry", state:"QLD", lat:-20.7056, lng:140.5056, title:"Cloncurry: Chasing Shade (and Gossip)", excerpt:"We spent three days in Cloncurry, exploring its history, murals, aviation heritage, and dam. From the first Qantas hangar to the birthplace of the RFDS, this outback town surprised us with stories and charm.", url:"https://www.offthemainroad.com.au/latest/cloncurry", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68db3402f6ffaf3609d6a3c6/1759196162683/IMG_1721.jpeg?format=1500w" },
{ name:"Karumba", state:"QLD", lat:-17.4833, lng:140.8333, title:"Savannah Way: Croydon, Normanton and Karumba", excerpt:"Travel the Savannah Way from Croydon to Normanton and Karumba. Discover Croydon's heritage precinct, Normanton's quirky Purple Pub and giant crocodile, and Karumba's sunsets on the Gulf.", url:"https://www.offthemainroad.com.au/latest/savannaway-croydon-normanton-karumba", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68d8c314b684d4356020463e/1759036180801/IMG_1631.jpeg?format=1500w" },
{ name:"Cobbold Gorge", state:"QLD", lat:-18.5333, lng:143.6833, title:"Cobbold Gorge QLD: Guided Tours, Glass Bridge & Outback Adventure", excerpt:"We explored Cobbold Gorge after a rugged drive from Forsayth. Floating along the calm waters and hiking to the glass bridge, we were captivated by the towering cliffs, wildlife, and serene beauty of this Queensland outback gem.", url:"https://www.offthemainroad.com.au/latest/cobbold-gorge", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68d6229eb71ed857e156dc09/1758864030974/IMG_1505.jpg?format=1500w" },
{ name:"Undara Lava Tubes", state:"QLD", lat:-18.2167, lng:144.6000, title:"Undara Lava Tubes: Underground Adventure", excerpt:"Exploring the Undara Lava Tubes was like stepping into another world — towering underground tunnels carved by ancient lava flows, part history, part geology, and all awe. A side quest well worth the detour.", url:"https://www.offthemainroad.com.au/latest/undarra-lava-tubes", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1758858334534-0F9HT7LKFQHHWP20SDZK/IMG_1355.jpeg?format=1000w" },
{ name:"Atherton Tablelands", state:"QLD", lat:-17.2667, lng:145.4833, title:"Atherton Tablelands: Rain, Historic Villages & Waterfalls", excerpt:"Soaked in Mareeba, charmed by Herberton's historic village, waterfall-hopped around Ravenshoe, and finished with cheesecake and live guitar — our journey through the Tablelands mixed history, nature, and indulgence in perfect balance.", url:"https://www.offthemainroad.com.au/latest/atherton-tablelands", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1758857320138-ZAVB4STJ9V8DPA9QBTOR/IMG_1304.jpeg?format=750w" },
{ name:"Cooktown", state:"QLD", lat:-15.4667, lng:145.2500, title:"Cooktown: Warm Days and Rough Edges", excerpt:"Cooktown charmed us with laid-back days, sunset cruises, museums, and even a cheeky paddle for Zoe. We wrapped it all up at the iconic Lions Den Hotel — live music, hearty meals, and full hearts.", url:"https://www.offthemainroad.com.au/latest/cooktown", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68d17897e47a6b3b2b7e2627/1758665879203/IMG_1084.jpeg?format=1500w" },
{ name:"Mossman", state:"QLD", lat:-16.4667, lng:145.3667, title:"North to Mossman", excerpt:"Camping at Newell Beach set the scene for exploring Mossman. We browsed markets, braved Mossman Gorge, detoured back to Cairns on a stunning coastal drive (with a giggle at Yorky's Knob), before heading inland towards Cooktown.", url:"https://www.offthemainroad.com.au/latest/mossman", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1758665831790-XTXSIOKHW6OVYD38R9B1/IMG_1084.jpeg?format=750w" },
{ name:"Cairns", state:"QLD", lat:-16.9186, lng:145.7781, title:"Babinda to Cairns to Kuranda", excerpt:"From swimming holes to rainforest tracks, our time between Babinda and Kuranda was a mix of sightseeing, family catch-ups, and a long-overdue crocodile feast.", url:"https://www.offthemainroad.com.au/latest/babinda-cairns-kuranda", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/350f5aa5-348b-4bee-8d2e-2c39ccca04dc/IMG_0877+%281%29.jpg?format=750w" },
{ name:"Paronella Park", state:"QLD", lat:-17.9333, lng:145.8833, title:"Paronella Park: Gumboots & Castles", excerpt:"We broke up the drive north with stops at coastal Cardwell, rainy Tully with its Golden Gumboot, and the atmospheric Paronella Park. Each stop offered its own charm before we pushed on towards Cairns.", url:"https://www.offthemainroad.com.au/latest/cardwell-tullly-paronellapark", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1758168250768-4O0LYW7L0RCJSVOLZ81C/IMG_0795_jpg.jpeg?format=750w" },
{ name:"Townsville", state:"QLD", lat:-19.2589, lng:146.8169, title:"Townsville: Views and Waterfall Wonders", excerpt:"Exploring North Queensland took us from the busy streets of Townsville to the calm waters of Big Crystal Creek and the sheer power of Wallaman Falls. City views, creek swims, and unforgettable waterfalls in one stretch.", url:"https://www.offthemainroad.com.au/latest/townsville", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1756969026163-ZBREGGZH5V915BB2P48G/IMG_0637.jpeg?format=750w" },
{ name:"Airlie Beach", state:"QLD", lat:-20.2692, lng:148.7183, title:"Creekside Surprises", excerpt:"From a tense river crossing and a surprise snake encounter to a crowded Airlie Beach and a quiet roadside camp in Home Hill — our journey north was full of unexpected turns and memorable stops.", url:"https://www.offthemainroad.com.au/latest/airliebeach-homehill", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1755147577047-A3FRWNG98ECPD09O7LIF/IMG_0561+%281%29.jpeg?format=750w" },
{ name:"Seaforth", state:"QLD", lat:-20.9000, lng:148.9667, title:"Seaforth: Quiet by the Sea", excerpt:"A quick coastal stop turned into seven relaxing days camped beneath palms in Seaforth. Beach swims for Zoe, fresh scones, friendly neighbours, and a kangaroo tourism reality check made this one of our favourite unexpected stays.", url:"https://www.offthemainroad.com.au/latest/seaforth", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1754449300893-AD7Y7XPFO3FEXU66SKZG/IMG_0537.JPG?format=750w" },
{ name:"Mackay", state:"QLD", lat:-21.1569, lng:149.1641, title:"A Week in Mackay", excerpt:"We spent a week in Mackay with family, exploring art galleries, sugar tours, vibrant laneway murals, and orchid-filled gardens. While the city didn't charm us completely, the time together made it memorable.", url:"https://www.offthemainroad.com.au/latest/mackay", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1753675634121-HQIXI9VU7HHFOBJXOTS5/IMG_0026.jpg?format=750w" },
{ name:"St Lawrence", state:"QLD", lat:-22.3500, lng:149.5333, title:"St Lawrence: Slowing Down on the Bruce", excerpt:"A roadside rescue, a closed pub, and a peaceful night in St Lawrence. Our trip from Rockhampton to Mackay was a reminder to slow down, lend a hand, and savour the road's unexpected moments.", url:"https://www.offthemainroad.com.au/latest/stlawrence", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1753047306227-Q7WXQPXKLGSH8EPX1CUQ/96A0EB19-1E64-4B7F-998C-F36712687833.jpg?format=750w" },
{ name:"Rockhampton", state:"QLD", lat:-23.3791, lng:150.5100, title:"Rockhampton Travel Guide | Heritage, Art & Outback Gateway", excerpt:"Explore Rockhampton, Central Queensland's hub of heritage and culture. From galleries and gardens to caves and rail history, discover what to see and do on your road trip.", url:"https://www.offthemainroad.com.au/latest/rockhampton2", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6879cc4ee2d56c232cee302e/1764151698880/IMG_9961.jpg?format=1500w" },
{ name:"Carnarvon Gorge", state:"QLD", lat:-25.0500, lng:148.2333, title:"Carnarvon Gorge Pt 2 | Trails, Art & Waterfalls", excerpt:"Carnarvon Gorge had been on our bucket list for years, and it didn't disappoint. Panoramic views, ancient rock art, dramatic cliffs, and lush pockets of green made this one of the most rewarding stops so far.", url:"https://www.offthemainroad.com.au/latest/carnarvongorgept2", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68ddd93ff9144c303140698b/1759369535512/IMG_9731.jpeg?format=1500w" },

{ name:"Broken Hill", state:"NSW", lat:-31.9537, lng:141.4677, title:"Broken Hill: Outback, Art and Buffalo Chicken Pizza", excerpt:"From buffalo chicken pizza to desert sculptures and Silverton's donkeys, Broken Hill gave us art, weather, and classic outback humour in equal measure. It's a place that surprises every time — dust storms included.", url:"https://www.offthemainroad.com.au/latest/broken-hill", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1762557289918-PW8L1OBIFB8OQ34VGDA0/IMG_2158.jpg?format=1500w" },
{ name:"Cobar", state:"NSW", lat:-31.4942, lng:145.8393, title:"Nyngan to Broken Hill: The Road Revisited", excerpt:"From Nyngan's riverside calm to Cobar's quiet bush camp and the long road to Broken Hill, this stretch of outback NSW is a reminder that sometimes, the in-between days are the best ones.", url:"https://www.offthemainroad.com.au/latest/nyngan-cobar-brokenhill", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1762555378001-0CLAS67U0GSQJFHJV2SA/73D44BBC-267D-4757-A217-9EC894911622_1_105_c.jpeg?format=1500w" },
{ name:"Armidale", state:"NSW", lat:-30.5128, lng:151.6672, title:"Armidale: Books, Markets and Cold Mornings", excerpt:"Armidale gave us cool mornings, friendly markets, and the joy of finding real bookshops again. With gardens, heritage, and country calm, it's the kind of inland town that makes you want to stay a little longer.", url:"https://www.offthemainroad.com.au/latest/armidale", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1762377391892-DLNKM3UW5IVQPG1AQ5V4/IMG_2077.JPG?format=1500w" },
{ name:"Woolgoolga", state:"NSW", lat:-30.1122, lng:153.1969, title:"Woolgoolga to the Tablelands", excerpt:"The NSW coast is busy, but not everywhere. From laid-back Woolgoolga to Bellingen's Butter Factory and the mountain roads to Dorrigo, we found the quiet corners still holding their charm.", url:"https://www.offthemainroad.com.au/latest/woolgoolga", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1762375814450-4SQPGO009XHDRFFNFJ7M/IMG_2062.JPG?format=1500w" },
{ name:"Mullumbimby", state:"NSW", lat:-28.5536, lng:153.4994, title:"Too Close in Mullumbimby", excerpt:"After braving Brisbane and the Gold Coast, Mullumbimby was an exhale. A leafy hinterland town of markets, vintage shops, and slow mornings at the showgrounds. Proof that the best stops aren't always planned.", url:"https://www.offthemainroad.com.au/latest/mullumbimby", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1761507912264-SK2COKU3H56AQWL5UEU2/IMG_2045.jpeg?format=1500w" },
{ name:"Lightning Ridge", state:"NSW", lat:-29.4333, lng:147.9833, title:"Lightning Ridge: Scones, Shenanigans and Poetry", excerpt:"Every now and then, you meet people on the road who feel like old friends. Mel and Susie's bush poetry, humour, and warm-heartedness made us instant fans — and lifelong mates.", url:"https://www.offthemainroad.com.au/latest/lighting-ridge-2", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1749527685217-U1MQ0N3KM5OCSML20XLF/IMG_9233.jpeg?format=1500w" },
{ name:"Lightning Ridge", state:"NSW", lat:-29.4333, lng:147.9833, title:"Lightning Ridge: Lush Ridge and Muddy Boots", excerpt:"We rolled into Lightning Ridge for the third time — this visit a little muddier than usual. After dodging puddles and slick backroads, both the moho and Jimny looked rally-ready and well-travelled.", url:"https://www.offthemainroad.com.au/latest/lightning-ridge", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1749526692624-JLV1OWZYFNTYHLQY9EHJ/IMG_0291.jpeg?format=1500w" },
{ name:"Burren Junction", state:"NSW", lat:-29.6833, lng:148.9667, title:"Chasing Warm Waters and Big Feeds", excerpt:"From Burren Junction's steaming thermal pool to Rowena's country pub, this stretch of Northern NSW delivered good food, warm water, and muddy roads — proof that slow travel still brings the best surprises.", url:"https://www.offthemainroad.com.au/latest/thermalpools", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1749007436592-BVTGN2MHI6Q6Z7XS68LU/IMG_9080.jpeg?format=1500w" },
{ name:"Narrabri", state:"NSW", lat:-30.3239, lng:149.7833, title:"Narrabri: Cotton, Columns and Radio Quiet", excerpt:"Narrabri surprised us with its blend of geology, science and relaxed country charm — from Sawn Rocks to market scones and a slightly embarrassing moment at the Telescope Array. A simple, easy stop on the Newell Highway.", url:"https://www.offthemainroad.com.au/latest/narrabri", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1749003044413-N61N69F0W6936EHDJ11N/IMG_9029.jpeg?format=1500w" },
{ name:"Pilliga Forest", state:"NSW", lat:-30.3833, lng:148.9000, title:"Pilliga NP: The Sandstone Caves", excerpt:"The Sandstone Caves in the Pilliga Forest offer a quiet, respectful walk to Aboriginal rock shelters. A short track that rewards slowing down and remembering that shared cultural places deserve the same care we give our own.", url:"https://www.offthemainroad.com.au/latest/pillaga-sandstone-caves", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1768728421808-911I8OSXNEH2V2VSZXOT/IMG_8955.jpeg?format=1500w" },
{ name:"Baradine", state:"NSW", lat:-30.9500, lng:149.1167, title:"Baradine: Into the Pilliga", excerpt:"Baradine is a quiet country town on the edge of the Pilliga Forest. A practical base for slow travel, forest drives, and unhurried exploration, it's the kind of place that rewards staying longer than planned.", url:"https://www.offthemainroad.com.au/latest/baradine", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1748651807425-EFLRHV0YLAY26N2MQVQ3/IMG_8881.jpeg?format=1500w" },
{ name:"Nyngan", state:"NSW", lat:-31.5583, lng:147.1917, title:"Nyngan: In Full Colour", excerpt:"While in town, we couldn't skip a quick visit to the Big Bogan — cheeky as ever and just as good for a second round of photos.", url:"https://www.offthemainroad.com.au/latest/nyngan", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1748312266801-J038P8QR31ESJRTOWBAS/IMG_9839.jpg?format=1500w" },
{ name:"Cobar", state:"NSW", lat:-31.4942, lng:145.8393, title:"Cobar: Second Time Lucky", excerpt:"A couple of days in Cobar gave us history, quiet station camping and a steady outback pace. From the museum to Glenhope's big skies, it's a relaxed stop between the central west and the far west.", url:"https://www.offthemainroad.com.au/latest/cobar", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1763370733076-UWIS4MYKZQUYW4AY7XSS/IMG_4593.jpeg?format=1500w" },
{ name:"Parkes", state:"NSW", lat:-33.1333, lng:148.1667, title:"Parkes: Standing Under The Dish", excerpt:"The Parkes Radio Telescope is an easy stop in central NSW, offering clear insight into Australia's role in space science. Standing beneath the dish puts both scale and history into sharp perspective.", url:"https://www.offthemainroad.com.au/latest/parkes", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1738300627082-REYIGLZEDC95NTWBOEWB/Parkes+Dish.jpg?format=1500w" },
{ name:"Junee", state:"NSW", lat:-34.8667, lng:147.5833, title:"Junee: Inside the Roundhouse", excerpt:"The Junee Roundhouse is one of Australia's last working railway roundhouses. Built in 1947, its vast turntable and engine bays offer a powerful glimpse into the steam era and the people who kept it running.", url:"https://www.offthemainroad.com.au/latest/junee", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1738301041579-SVP1J1L4JYWOEWY1ZLCJ/469263878_18008705195673613_1403527699609195026_n.jpg?format=1500w" },
{ name:"Tenterfield", state:"NSW", lat:-29.0500, lng:152.0167, title:"Tenterfield: Saddles, Pies and Country Charm", excerpt:"Pies, saddles, and cool mountain air. Tenterfield surprised us in all the right ways. A heritage town with a big heart and small-town charm, perfect for slowing down and soaking it all in.", url:"https://www.offthemainroad.com.au/latest/cobbold-gorge-8mcdt-kr96h", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1762640069990-UHUM2M0NH75CF5RTEY9K/IMG_0507.jpg?format=1500w" },
{ name:"Ballina", state:"NSW", lat:-28.8667, lng:153.5667, title:"Ballina: Prawns, Pubs and a Breakwater Stroll", excerpt:"Sea breezes, dolphin sightings, and a pub by the bay. Ballina gave us exactly the kind of coastal calm we needed. A giant prawn, a quiet walk, and zero influencer chaos.", url:"https://www.offthemainroad.com.au/latest/cobbold-gorge-8mcdt-j458s", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1762598510736-BBZDFHT2MWOSOT7P8DW5/IMG_5865.jpg?format=1500w" },
{ name:"Canberra", state:"ACT", lat:-35.2809, lng:149.1300, title:"Canberra: Cold Snaps & Political Thrills", excerpt:"Canberra gave us politics, culture, frozen motorhome pipes, and a proper taste of ACT crispness. From Old Parliament House to Lake Burley Griffin, it was one of the most surprising stops of our shakedown trip.", url:"https://www.offthemainroad.com.au/latest/bermagui-s5tex", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1764196153288-QCZB9LUSUWQBO0YSFHFC/IMG_4337.jpeg?format=1500w" },
{ name:"Batemans Bay", state:"NSW", lat:-35.7083, lng:150.1742, title:"Bays and Backroads", excerpt:"From Bermagui to Batemans Bay, the coastal road carried us past dolphins, fish and chips, and a growing sense of ease. Small towns, quiet bays, and days that felt unhurried — finally finding our road rhythm.", url:"https://www.offthemainroad.com.au/latest/batemansbay", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1760609842377-TZIATEJQZVSOIJJ8CSXV/IMG_4322.jpg?format=1500w" },
{ name:"Bermagui", state:"NSW", lat:-36.4167, lng:150.0667, title:"The Sapphire Coast Stretch", excerpt:"Tilba Tilba cheese, Bermagui's Blue Pool, and tall pub stories marked the moment we started finding our rhythm on the road — and learned that good cheese might just be worth every detour.", url:"https://www.offthemainroad.com.au/latest/bermagui", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1760154330107-S7X3Z13JJDO44KUF86HB/IMG_4267.jpeg?format=1500w" },
{ name:"Merimbula", state:"NSW", lat:-36.8942, lng:149.9064, title:"Sand and Salt in Merimbula", excerpt:"In Merimbula, we traded busy travel for slow days by the sea. We fixed our first flat tyre, ate oysters by the dozen, and learned that quiet time can be the best part of the trip.", url:"https://www.offthemainroad.com.au/latest/merimbula", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1760153738806-T9DTWQSSKEFXHS1I18VN/71142310496__6EFF1339-B0DE-4155-ABB5-579328F89B23.jpeg?format=1500w" },
{ name:"Eden", state:"NSW", lat:-37.0667, lng:149.9000, title:"The Shakedown Begins", excerpt:"Our first motorhome trip from Geelong to Eden was equal parts chaos and discovery. We packed too much, sang off-key in a winery, and learned fast that the road has its own rhythm.", url:"https://www.offthemainroad.com.au/latest/theshakedown-part1", img:"https://images.squarespace-cdn.com/content/v1/677db4b4e547f661c8b7284f/1760152639455-D0U77M1DYKH647S0ANKR/IMG_5766.jpg?format=1500w" },

/* ── Map setup ── */
const map = L.map('map', { center: [-25, 134], zoom: 5, scrollWheelZoom: 'cooperative' });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

/* ── Clusters ── */
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 55,
  iconCreateFunction: function(cluster) {
    const n = cluster.getChildCount();
    const size = n < 10 ? 36 : 42;
    return L.divIcon({
      html: '<div class="otmr-cluster" style="width:' + size + 'px;height:' + size + 'px">' + n + '</div>',
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
    });
  }
});

/* ── Pin icon ── */
function makePin() {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">'
    + '<path d="M15 0C6.72 0 0 6.72 0 15c0 10.5 15 23 15 23S30 25.5 30 15C30 6.72 23.28 0 15 0z" fill="' + PIN_COLOR + '"/>'
    + '<circle cx="15" cy="15" r="6" fill="white" opacity="0.9"/>'
    + '</svg>';
  return L.divIcon({ html: svg, className: '', iconSize: [30,38], iconAnchor: [15,38] });
}

/* ── Add markers ── */
destinations.forEach(function(d) {
  var marker = L.marker([d.lat, d.lng], { icon: makePin() });
  marker.destData = d;
  marker.on('click', function() {
    openSidebar(this.destData);
  });
  clusterGroup.addLayer(marker);
});

map.addLayer(clusterGroup);

/* ── Sidebar ── */
function haversineKm(lat1,lng1,lat2,lng2){var R=6371,dL=(lat2-lat1)*Math.PI/180,dG=(lng2-lng1)*Math.PI/180,a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function openSidebar(d) {
  var tag = document.getElementById('sb-tag');
  tag.textContent = d.state;
  tag.style.background = PIN_COLOR + '22';
  tag.style.color = PIN_COLOR;
  tag.style.border = '1px solid ' + PIN_COLOR + '55';
  document.getElementById('sb-title').textContent = d.title || d.name;
  document.getElementById('sb-location').textContent = d.name + ' · ' + (STATE_NAMES[d.state] || d.state);
  document.getElementById('sb-excerpt').textContent = d.excerpt;
  document.getElementById('sb-btn').href = d.url;
  var img = document.getElementById('sb-img');
  var ph = document.getElementById('sb-placeholder');
  if (d.img) {
    img.src = d.img;
    img.alt = d.title || d.name;
    img.style.display = 'block';
    ph.style.display = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display = 'flex';
  }
  var nb = document.getElementById('sb-nearby');
  nb.innerHTML = '';
var seen = {};
var others = destinations
  .map(function(o,i){return{o:o,i:i,km:haversineKm(d.lat,d.lng,o.lat,o.lng)};})
  .filter(function(x){ 
    if(x.o.name === d.name) return false;
    if(seen[x.o.name]) return false;
    seen[x.o.name] = true;
    return true;
  })
  .sort(function(a,b){return a.km-b.km;})
  .slice(0,4);;
  if(others.length){var lbl=document.createElement('p');lbl.className='nearby-label';lbl.textContent='Nearby stories on the map';nb.appendChild(lbl);others.forEach(function(x){var c=document.createElement('button');c.className='nearby-chip';c.textContent=x.o.name+' · '+Math.round(x.km)+'km';c.onclick=function(){openSidebar(x.o);};nb.appendChild(c);});}
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

map.on('click', function() { closeSidebar(); });
</script>
