<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Off the Main Road — Destination Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'nunito', sans-serif;
  height: 100vh;
  overflow: hidden;
  background: #f5f2ee;
}

#map {
  width: 100%;
  height: 100vh;
}

.otmr-cluster {
  background: #61856F;
  border: 3px solid #fff;
  border-radius: 50%;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

#sidebar {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100%;
  background: #FDFAF6;
  border-left: 1px solid #e8e4de;
  display: flex;
  flex-direction: column;
  z-index: 1000;
  transform: translateX(100%);
  transition: transform 0.28s ease;
  box-shadow: -4px 0 20px rgba(0,0,0,0.1);
}

#sidebar.open {
  transform: translateX(0);
}

#sb-img-wrap {
  position: relative;
  height: 180px;
  flex-shrink: 0;
  background: #f0ece6;
  overflow: hidden;
}

#sb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  position: absolute;
  top: 0; left: 0;
}

#sb-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#sb-close {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: none;
  cursor: pointer;
  color: #fff;
  font-size: 16px;
  line-height: 30px;
  text-align: center;
  z-index: 10;
}

#sb-close:hover { background: rgba(0,0,0,0.75); }

#sb-body {
  padding: 18px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#sb-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  align-self: flex-start;
}

#sb-title {
  font-size: 16px;
  font-weight: 600;
  color: #2c2a26;
  line-height: 1.3;
}

#sb-location {
  font-size: 12px;
  color: #8a8278;
}

#sb-excerpt {
  font-size: 13px;
  color: #5a5650;
  line-height: 1.65;
  flex: 1;
}

#sb-btn {
  display: block;
  text-align: center;
  padding: 11px 16px;
  background: #61856F;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s;
}

#sb-btn:hover { background: #4a6657; }

.leaflet-control-attribution { font-size: 10px !important; }
</style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div id="sb-img-wrap">
    <img id="sb-img" src="" alt=""/>
    <div id="sb-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2c2a26" stroke-width="1.2" opacity="0.3">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <button id="sb-close" onclick="closeSidebar()">&#x2715;</button>
  </div>
  <div id="sb-body">
    <span id="sb-tag"></span>
    <p id="sb-title"></p>
    <p id="sb-location"></p>
    <p id="sb-excerpt"></p>
    <a id="sb-btn" href="#" target="_blank">Read the full story &rarr;</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>

const PIN_COLOR = "#61856F";

const STATE_NAMES = {
  QLD: "Queensland", NSW: "New South Wales", VIC: "Victoria",
  SA: "South Australia", WA: "Western Australia", NT: "Northern Territory", TAS: "Tasmania"
};

/* ── Destinations ──────────────────────────────────────────────
   To add a new article, copy any entry and paste it at the top.
   Fill in name, state, lat, lng, title, excerpt, url, img.
────────────────────────────────────────────────────────────── */
const destinations = [
/* ── South Australia── */
{ name:"Adelaide", state:"SA", lat:-34.9285, lng:138.6007, title:"Adelaide: Museums, Markets and a Slow Day in the City", excerpt:"Spend a slow day in Adelaide with art galleries, museums, the Botanic Gardens and the iconic Central Market. Our favourite city stops in one easy loop through South Australia's capital.", url:"https://www.offthemainroad.com.au/latest/adelaide", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6930a1558e72653f0581ff5c/1764794709801/IMG_2305.jpg?format=1500w" },
{ name:"Hahndorf", state:"SA", lat:-35.0333, lng:138.8167, title:"Hahndorf: German Heritage, Gin Tastings and Adelaide Hills Food", excerpt:"Explore Hahndorf in the Adelaide Hills: German heritage, gin tastings, Beerenberg Farm and relaxed village wandering. A perfect food-filled day trip near Adelaide.", url:"https://www.offthemainroad.com.au/latest/hahndorf", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/692bf4ad8342631cdb547c61/1764488365142/IMG_2284.jpg?format=1500w" },
{ name:"McLaren Vale", state:"SA", lat:-35.2167, lng:138.5500, title:"McLaren Vale: d'Arenberg Cube, Chalk Hill and Wine Country", excerpt:"Visit McLaren Vale for quirky art at the d'Arenberg Cube, pizza at Chalk Hill, top cellar doors and must-stop treats like Fruchocs.", url:"https://www.offthemainroad.com.au/latest/mclarenvale", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691ed7c725ed2f072cf70d1f/1763628999818/IMG_0045.jpg?format=1500w" },
{ name:"Barossa: Whispering Wall", state:"SA", lat:-34.5167, lng:138.9500, title:"Barossa: Sculpture Park and the Whispering Wall", excerpt:"Visit the Barossa Sculpture Park and Whispering Wall. Art, valley views, historic engineering and the acoustic trick that carries whispers 140 metres across the dam.", url:"https://www.offthemainroad.com.au/latest/barossa-whispering-wall", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691eb0ce5bbc6e1029d6b9b8/1763619022711/IMG_3082.jpg?format=1500w" },
{ name:"Nuriootpa: Maggie Beer's Farm", state:"SA", lat:-34.4667, lng:138.9833, title:"Nuriootpa:Maggie Beer's Farm Shop and Barossa Morning Tea", excerpt:"Visit Maggie Beer's Farm Shop in Nuriootpa. Morning tea by the lake, Cook and the Chef filming kitchen, quinces, orchard walks and Barossa calm.", url:"https://www.offthemainroad.com.au/latest/maggies-farm", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691ead500098d7493d010870/1763618128868/IMG_2638.jpeg?format=1500w" },
{ name:"Waikerie", state:"SA", lat:-34.1833, lng:139.9833, title:"Waikerie: River Ferries, Silo Art and Citrus Country", excerpt:"Visit Waikerie in South Australia's Riverland. River ferries, silo art, Nippy's milk, riverfront walks and one of our favourite bakeries in the country.", url:"https://www.offthemainroad.com.au/latest/waikerie", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691e84070098d7493d00e6eb/1763607559808/IMG_2784.jpeg?format=1500w" },
{ name:"Renmark", state:"SA", lat:-34.1667, lng:140.7500, title:"Renmark: What to Do, Dog-Friendly Stops & an Easy Day Trip", excerpt:"A relaxed day in Renmark. Headings Cliff lookout, the historic Paringa lifting bridge, pet-friendly cafés and kangaroos along the river tracks.", url:"https://www.offthemainroad.com.au/latest/renmark", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/69185147c369aa782aa20013/1763201351938/IMG_3005.jpeg?format=1500w" },
{ name:"Coober Pedy", state:"SA", lat:-29.0135, lng:134.7544, title:"Coober Pedy: Underground Life and Opal Dreams", excerpt:"Beneath the desert heat of Coober Pedy lies a town built underground — opals, dugouts, and outback grit in South Australia's most unusual stopover.", url:"https://www.offthemainroad.com.au/latest/cooberpedy", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/677de8c08c6bc52e8f6646ef/1736304911707/IMG_7598.jpg?format=1500w" },
{ name:"Lake Bonney, Barmera", state:"SA", lat:-34.2500, lng:140.4667, title:"Lake Bonney and Barmera: A Laid-Back Stop in the Riverland", excerpt:"Calm water, sunsets, and small-town charm. Lake Bonney at Barmera is a peaceful Riverland stop perfect for campers, swimmers, and slow travellers chasing South Australia's relaxed side.", url:"https://www.offthemainroad.com.au/latest/lakebonney", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a02ee8349ca524447d7b36/1760772943592/469162411_18008702990673613_8749658563561103998_n.jpg?format=1500w" },
{ name:"Farrell Flat", state:"SA", lat:-33.8167, lng:138.8000, title:"Farrell Flat: Silo Art and Country Pub Charm", excerpt:"A quick stop between Burra and Clare, Farrell Flat surprises with big-hearted locals, a historic pub, and one of South Australia's best pieces of silo art.", url:"https://www.offthemainroad.com.au/latest/farrellflat", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a047bb6166f51fba13d73f/1760772937160/469250013_18008701970673613_1416303917373296075_n.jpg?format=1500w" },
{ name:"Château Yaldara", state:"SA", lat:-34.5333, lng:138.9000, title:"Château Yaldara: Barossa History and Wine Tasting", excerpt:"Visit Château Yaldara in the Barossa. Historic architecture, classic red wines, fortifieds and riverfront grounds in Lyndoch.", url:"https://www.offthemainroad.com.au/latest/chateauyaldara", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691ed2445bbc6e1029d6cdaf/1763627588662/Chateau+Yaldara.jpg?format=1500w" },
{ name:"Wirrabara", state:"SA", lat:-33.0333, lng:138.2667, title:"Wirrabara", excerpt:"Driving into Wirrabara, we immediately spotted the towering artwork, a stunning addition to South Australia's Silo Art Trail.", url:"https://www.offthemainroad.com.au/latest/wirraburra", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a0497eb23d742bd0d8926d/1760772917792/469222240_18008702120673613_6201080849379515516_n.jpg?format=1500w" },
{ name:"Parachilna", state:"SA", lat:-31.1333, lng:138.4000, title:"Parachilna: Prairie Hotel, Feral Food & Flinders Stop", excerpt:"Visit Parachilna in South Australia for a relaxed stop at the Prairie Hotel. Feral food, outback history, and an easy pause on the edge of the Flinders Ranges.", url:"https://www.offthemainroad.com.au/latest/parachilna", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a04a2bf5b6c40e7ea30db1/1765790785269/Prairie+Hotel.jpg?format=1500w" },
{ name:"Leigh Creek", state:"SA", lat:-30.5833, lng:138.4000, title:"Leigh Creek: A Town in Transition", excerpt:"Visit Leigh Creek, a former coal town in South Australia's Flinders Ranges now finding new life. Discover its past, the vast open-cut mine, and the resilient community shaping the town's future.", url:"https://www.offthemainroad.com.au/latest/leighcreek", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a04ad89226da0371353a6c/1760772904157/469120902_18008701982673613_8352526249675027075_n.jpg?format=1500w" },
{ name:"Carrieton & Johnburg", state:"SA", lat:-32.4333, lng:138.5167, title:"Carrieton & Johnburg: Outback Heritage & Quiet Country Towns", excerpt:"Visit Carrieton and Johnburg, two quiet towns in South Australia's outback. Discover rodeo heritage, stone buildings, and the peaceful charm of life off the main road.", url:"https://www.offthemainroad.com.au/latest/carrieton", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68e6e578e89d27768f7b88ff/1759962488839/434662619_17977680191673613_4285692039490006271_n.jpg?format=1500w" },
{ name:"Pandurra Station", state:"SA", lat:-32.4500, lng:137.8000, title:"Pandurra Station: South Australia Outback Travel Stay", excerpt:"Experience South Australia outback travel at Pandurra Station and Nutbush Retreat near Port Augusta. Stay on a working sheep station, tour the shearing shed, and enjoy sunsets over the red plains.", url:"https://www.offthemainroad.com.au/latest/pandurrastation", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/67a05d6ba43c9045e77999fe/1760772875732/469195963_18008702081673613_1318726345414053311_n.jpg?format=1500w" },
{ name:"Iron Knob", state:"SA", lat:-32.7333, lng:137.1500, title:"Iron Knob: Mining History and Australia's Steel Story", excerpt:"A visit to Iron Knob in South Australia, exploring its mining history, open-cut mine tour, and role in Australia's steel industry. A raw, practical stop near Whyalla on the Eyre Peninsula.", url:"https://www.offthemainroad.com.au/latest/iron-knob", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/69811300d969c935e4ce0304/1770066688182/IMG_2172.jpg?format=1500w" },
{ name:"Kimba", state:"SA", lat:-33.1333, lng:136.4167, title:"Kimba: Silo Art, the Giant Galah and a Great Free Camp", excerpt:"Kimba is a welcoming stop on South Australia's Eyre Peninsula, known for silo art, the Giant Galah, Workshop26 café, and one of Australia's best free camps right in town.", url:"https://www.offthemainroad.com.au/latest/kimba", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6984fd496a1d184ccf93cecf/1770323273076/IMG_2166.jpg?format=1500w" },
{ name:"Wudinna", state:"SA", lat:-33.0500, lng:135.4667, title:"Wudinna: Granite, Stars and New Mates", excerpt:"Climbing Mt Wudinna gave us sweeping views and sore calves, while nearby Polda Rock offered a quiet slice of history. We wrapped the day with stargazing, new mates, and moonlight — outback travel at its best.", url:"https://www.offthemainroad.com.au/latest/mtwudinna", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/684f876894fa8c7777dd022a/1763681614754/469303992_18008701646673613_920144801279322452_n.jpg?format=1500w" },
{ name:"Wirrulla", state:"SA", lat:-32.3833, lng:134.5333, title:"Wirrulla: The Jetty without a Tide", excerpt:"Discover Wirrulla, the outback town with the world's only inland jetty. A quirky stop on the Eyre Peninsula where the tide never comes in.", url:"https://www.offthemainroad.com.au/latest/wirrulla", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/68ffd6a3f2b196065a781e84/1761597091123/469120872_18008702015673613_6733575477633716453_n.jpg?format=1500w" },
{ name:"Penong & Lake MacDonnell", state:"SA", lat:-31.9167, lng:133.0167, title:"Pink Lake, Big Skies", excerpt:"From bubblegum-pink waters to spinning giants of steel, Lake MacDonnell and Penong's Windmill Museum gave us one of our most colourful days yet. A little off the main road — and totally worth it.", url:"https://www.offthemainroad.com.au/latest/penong", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/690285ca2b6d597fa22bd2a1/1761773002787/469278446_18008701925673613_783620613695857616_n.webp?format=1500w" },
{ name:"Ceduna", state:"SA", lat:-32.1333, lng:133.6667, title:"Ceduna: Wharf Walks, Museum Days and Coastal Calm", excerpt:"Ceduna on South Australia's far-west coast. Foreshore walks, the local museum, quiet days by the sea and a gateway for future Maralinga adventures.", url:"https://www.offthemainroad.com.au/latest/ceduna", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/691f9a8818ed673989f88afe/1763678856596/IMG_1639+%282%29.jpg?format=1500w" },
{ name:"Baird Bay", state:"SA", lat:-33.1167, lng:134.3167, title:"Baird Bay: Sea Lions, Sunsets and Swaps", excerpt:"Swimming with a sea lion pup and a pod of dolphins in Baird Bay kicked off a magical stretch of coast. Fresh crabs, epic sunsets, and time to unwind made this leg one to remember.", url:"https://www.offthemainroad.com.au/latest/bairdbay", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/685394b7209926641aed3298/1750308023763/469140942_18008700635673613_5214694956221579351_n.jpg?format=1500w" },
{ name:"Murphy's Haystacks & Talia Caves", state:"SA", lat:-33.3167, lng:134.9000, title:"Murphy's Haystacks & Talia Caves: Stone, Sea and Quiet Camps", excerpt:"We camped alone beside Murphy's Haystacks, exploring the surreal boulders at both sunset and sunrise. With local honey for breakfast and sea-carved caves nearby, this quiet corner of the Eyre Peninsula left a lasting impression.", url:"https://www.offthemainroad.com.au/latest/murphyshaystacks", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/6853974dbc6ba91bcec40c2e/1764372672358/469140739_18008700998673613_4722065227158227476_n.jpg?format=1500w" },
{ name:"Elliston", state:"SA", lat:-33.6500, lng:134.8833, title:"Elliston: Seaside Creativity", excerpt:"Stormy skies couldn't dull the charm of Elliston. From windswept jetty walks to the quirky sculptures along the Great Ocean Drive, this coastal town served up wild weather, dramatic views, and creative surprises.", url:"https://www.offthemainroad.com.au/latest/elliston", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/685607c8c9be8157fa2f3a52/1760772825439/469208518_18008700509673613_725116440466624307_n.jpg?format=1500w" },
{ name:"Coffin Bay", state:"SA", lat:-34.6167, lng:135.4667, title:"Coffin Bay: Oysters, National Park & Slow Coastal Travel", excerpt:"Visit Coffin Bay SA — oysters, calm coastal camping, national park beaches, local seafood and quiet village life. A slow-travel guide with tips on the best oysters and things to do in Coffin Bay.", url:"https://www.offthemainroad.com.au/latest/coffin-bay", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/693493d6381b741bbf0d4367/1765054619587/IMG_1707.jpg?format=1500w" },
{ name:"Port Lincoln", state:"SA", lat:-34.7333, lng:135.8667, title:"Port Lincoln: Facing Fears", excerpt:"Port Lincoln dished up an unforgettable day as Cameron took on a shark diving dare. No sharks, but the real thrill was facing the deep blue and walking away braver, and wetter than before.", url:"https://www.offthemainroad.com.au/latest/portlincoln", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/68572b2271e07359e68a79e9/1760772808685/469286775_18008700704673613_3372333966322166895_n.jpg?format=1500w" },
{ name:"Tumby Bay", state:"SA", lat:-34.3667, lng:136.1000, title:"Tumby Bay: Street Art, Jetty Views and Coastal Calm", excerpt:"Discover Tumby Bay on the Eyre Peninsula: jetty views, vibrant street art, Yeldulknie Weir and slow coastal charm. A relaxed stop between Port Neill and Port Lincoln.", url:"https://www.offthemainroad.com.au/latest/tumbybay", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/692a2c5380600a01dce336b3/1764371539160/469140746_18008699387673613_1158856293943559948_n.jpg?format=1500w" },
{ name:"Whyalla & Cowell", state:"SA", lat:-33.0333, lng:137.5667, title:"Whyalla & Cowell: Steel, Sea and Small-Town Charm", excerpt:"Explore Whyalla's steelworks, circular jetty, and Point Lowly Lighthouse before heading south to Cowell's colourful silo art and quiet coastlines. A perfect slice of Eyre Peninsula travel.", url:"https://www.offthemainroad.com.au/latest/whyalla", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/690bccc3f5e03b6b9ab2b64a/1762380995687/469326281_18008699531673613_8558429415446032037_n.webp?format=1500w" },
{ name:"Spear Creek", state:"SA", lat:-32.5833, lng:138.6333, title:"Spear Creek Flinders Ranges: Camping, Trails and Ancient Landscapes", excerpt:"Spear Creek delivers rugged walking trails, ancient landscapes and big-sky views on the edge of the Southern Flinders Ranges. A peaceful station stay with sunrise hikes, rocky gullies and unforgettable outback evenings.", url:"https://www.offthemainroad.com.au/latest/spearcreek", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/6931fdbbfcd4a839fc94d11f/1764883899142/IMG_7447.jpeg?format=1500w" },
{ name:"Port Augusta", state:"SA", lat:-32.4936, lng:137.7654, title:"Port Augusta: Where the Desert Meets the Sea", excerpt:"Port Augusta, South Australia: crossroads of the outback. Explore Spear Creek, Pandurra Station, and local highlights including the Arid Lands Botanic Garden and Wadlata Outback Centre.", url:"https://www.offthemainroad.com.au/latest/port-augusta", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/t/69066c508a3aff4c42cf4731/1762028624636/unsplash-image-uiWqatFp9n0.jpg?format=1500w" },
{ name:"Moonta", state:"SA", lat:-34.0667, lng:137.5833, title:"Moonta: Mining Tales and Mateship", excerpt:"We rolled into Moonta with good friends and found history, sandstone charm, and a camp full of laughs. Exploring the old copper mine and eerie slime pits gave us a glimpse into South Australia's mining past.", url:"https://www.offthemainroad.com.au/latest/moonta", img:"https://static1.squarespace.com/static/677db4b4e547f661c8b7284f/677dc820029b773470613833/685918f9ee4717233c5440a1/1760780518609/469351467_18008698037673613_7777452120649171669_n.jpg?format=1500w" },

/* ── Map setup ── */
const map = L.map('map', { center: [-25, 134], zoom: 5, scrollWheelZoom: 'cooperative' });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

/* ── Clusters ── */
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 55,
  iconCreateFunction: function(cluster) {
    const n = cluster.getChildCount();
    const size = n < 10 ? 36 : 42;
    return L.divIcon({
      html: '<div class="otmr-cluster" style="width:' + size + 'px;height:' + size + 'px">' + n + '</div>',
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
    });
  }
});

/* ── Pin icon ── */
function makePin() {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">'
    + '<path d="M15 0C6.72 0 0 6.72 0 15c0 10.5 15 23 15 23S30 25.5 30 15C30 6.72 23.28 0 15 0z" fill="' + PIN_COLOR + '"/>'
    + '<circle cx="15" cy="15" r="6" fill="white" opacity="0.9"/>'
    + '</svg>';
  return L.divIcon({ html: svg, className: '', iconSize: [30,38], iconAnchor: [15,38] });
}

/* ── Add markers ── */
destinations.forEach(function(d) {
  var marker = L.marker([d.lat, d.lng], { icon: makePin() });
  marker.destData = d;
  marker.on('click', function() {
    openSidebar(this.destData);
  });
  clusterGroup.addLayer(marker);
});

map.addLayer(clusterGroup);

/* ── Sidebar ── */
function openSidebar(d) {
  var tag = document.getElementById('sb-tag');
  tag.textContent = d.state;
  tag.style.background = PIN_COLOR + '22';
  tag.style.color = PIN_COLOR;
  tag.style.border = '1px solid ' + PIN_COLOR + '55';

  document.getElementById('sb-title').textContent = d.title || d.name;
  document.getElementById('sb-location').textContent = d.name + ' · ' + (STATE_NAMES[d.state] || d.state);
  document.getElementById('sb-excerpt').textContent = d.excerpt;
  document.getElementById('sb-btn').href = d.url;

  var img = document.getElementById('sb-img');
  var ph = document.getElementById('sb-placeholder');

  if (d.img) {
    img.src = d.img;
    img.alt = d.title || d.name;
    img.style.display = 'block';
    ph.style.display = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display = 'flex';
  }

  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

map.on('click', function() { closeSidebar(); });

</script>
